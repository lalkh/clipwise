<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 视频分析 & 自动剪辑</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <h1>AI 视频工具</h1>
        <div class="tabs">
            <button class="tab active" data-panel="analyze">视频拉片</button>
            <button class="tab" data-panel="auto-edit">自动剪辑</button>
        </div>
        <div class="header-right">
            <span id="statusDot" class="status-dot disconnected" title="未连接"></span>
            <button id="settingsBtn" class="settings-btn" title="设置">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h2>设置</h2>
                <button id="closeSettings" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label class="setting-label">Claude 连接状态</label>
                    <div id="settingsStatus" class="settings-status">
                        <span class="status-dot disconnected"></span>
                        <span class="status-text">检查中...</span>
                    </div>
                </div>
                <div class="setting-group">
                    <label class="setting-label">Claude 账号登录</label>
                    <p class="setting-hint">点击登录 → 在浏览器授权 → 将授权码粘贴回来</p>
                    <button id="startLogin" class="btn btn-primary" style="width:100%">登录 Claude</button>
                    <div id="loginArea" style="display:none;margin-top:12px">
                        <p style="color:#a29bfe;font-size:13px;margin-bottom:8px">1. 在浏览器中完成授权：</p>
                        <div style="background:#111;border:1px solid #444;border-radius:8px;padding:12px;word-break:break-all">
                            <a id="loginUrl" href="#" target="_blank" style="color:#6c5ce7;font-size:12px;font-family:monospace"></a>
                        </div>
                        <p style="color:#a29bfe;font-size:13px;margin-top:14px;margin-bottom:8px">2. 将授权码粘贴到下方：</p>
                        <div class="api-key-input">
                            <input type="text" id="authCodeInput" placeholder="粘贴授权码..." class="input-field" style="font-family:monospace">
                            <button id="submitCode" class="btn btn-primary" style="white-space:nowrap">提交</button>
                        </div>
                        <div id="codeResultMsg" style="margin-top:8px;font-size:13px;display:none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Panel 1: Video Analysis -->
        <div id="analyze" class="panel active">
            <div class="upload-zone" id="analyzeUpload">
                <h3>上传视频进行分析</h3>
                <p>拖拽视频文件到此处，或点击选择文件</p>
                <p style="margin-top:8px;font-size:12px;color:#666">支持 MP4, MOV, AVI 等格式</p>
                <input type="file" id="analyzeFile" accept="video/*">
            </div>

            <div class="progress-container" id="analyzeProgress">
                <div class="progress-bar">
                    <div class="progress-fill" id="analyzeProgressFill"></div>
                </div>
                <div class="progress-text" id="analyzeProgressText">准备中...</div>
            </div>

            <div id="analyzeResult"></div>

            <div id="analysisHistory" style="margin-top:24px"></div>
        </div>

        <!-- Panel 2: Auto Edit -->
        <div id="auto-edit" class="panel">
            <div class="template-select">
                <h3>1. 选择模板分析</h3>
                <p style="color:#888;font-size:13px;margin-bottom:12px">选择一个已完成的视频分析作为剪辑模板</p>
                <select id="templateSelect" class="template-dropdown">
                    <option value="">-- 请选择模板 --</option>
                </select>
                <div id="templateInfo" class="template-info" style="display:none"></div>
            </div>

            <div class="upload-zone" id="materialUpload">
                <h3>2. 上传素材</h3>
                <p>拖拽视频/图片/文件夹到此处，或点击多选文件</p>
                <p style="margin-top:8px;font-size:12px;color:#666">支持视频和图片格式，文件夹会自动提取其中的媒体文件</p>
                <input type="file" id="materialFiles" accept="video/*,image/*" multiple webkitdirectory>
                <input type="file" id="materialFilesFlat" accept="video/*,image/*" multiple style="display:none">
                <div style="margin-top:12px;display:flex;gap:8px;justify-content:center">
                    <button class="btn" style="background:#333;color:#ccc;font-size:13px;padding:6px 14px" onclick="document.getElementById('materialFilesFlat').click()">选择文件</button>
                    <button class="btn" style="background:#333;color:#ccc;font-size:13px;padding:6px 14px" onclick="document.getElementById('materialFiles').click()">选择文件夹</button>
                </div>
            </div>

            <div class="material-list" id="materialList"></div>

            <div style="margin:12px 0">
                <h3 style="color:#a29bfe;font-size:14px;margin-bottom:8px">4. 剪辑指令（可选）</h3>
                <textarea id="editPrompt" rows="3" placeholder="输入额外的剪辑指令，例如：&#10;• 开头文字要大一些，和原视频一样的位置&#10;• 最后一个镜头用竖版LOGO图&#10;• 第5个镜头用视频不要用图片"
                    style="width:100%;background:#222;border:1px solid #444;border-radius:8px;color:#e0e0e0;padding:10px;font-size:13px;resize:vertical"></textarea>
            </div>

            <button class="btn btn-primary" id="startEdit" disabled>开始自动剪辑</button>

            <div class="progress-container" id="editProgress">
                <div class="progress-bar">
                    <div class="progress-fill" id="editProgressFill"></div>
                </div>
                <div class="progress-text" id="editProgressText">准备中...</div>
            </div>

            <div id="editResult"></div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
